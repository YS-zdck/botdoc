<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QQ机器人开发文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="QQ机器人官方文档">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="./lib/themes/vue.css">
  <meta name="baidu-site-verification" content="codeva-aXoTXwp8mQ" />
  <style>
    /* 表格样式 */
    .table-wrapper { overflow-x: auto; margin: 1em 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 4px; overflow-x: auto; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
    .custom-block { padding: 12px 16px; margin: 16px 0; border-left: 4px solid; background: #f5f5f5; }
    .custom-block.tip { border-color: #42b983; }
    .custom-block.warning { border-color: #ffa500; }
    .custom-block.danger { border-color: #f44336; }
    .custom-block-title { font-weight: bold; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'QQ机器人开发文档',
      repo: '',
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 6,
      auto2top: true,
      homepage: 'README.md',
      search: {
        paths: 'auto',
        placeholder: '搜索文档',
        noData: '找不到结果',
        depth: 6,
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      }
    };
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="./lib/plugins/search.min.js"></script>
  <!-- 一键复制插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <!-- 代码高亮 - 使用CDN -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <!-- 字数统计-->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <!-- emoji-->
  <script src="./lib/plugins/emoji.min.js"></script>
</body>
</html>
